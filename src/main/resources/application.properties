# ===================================
# CryptoTrack Analytics Configuration
# ===================================

# Application
spring.application.name=DataCoin
server.port=8080

# H2 In-Memory Database (no installation needed)
spring.datasource.url=jdbc:h2:mem:cryptotrackdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# JPA / Hibernate
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false

# H2 Console (access at http://localhost:8080/h2-console)
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# CoinGecko API Base URL
coingecko.api.base-url=https://api.coingecko.com/api/v3

# Scheduler - fetch data every 5 minutes (300000 ms)
scheduler.fetch-interval=300000
